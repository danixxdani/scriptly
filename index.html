<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scriptly</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400&family=Courier+New&family=IBM+Plex+Mono:wght@400;700&family=IBM+Plex+Sans+KR:wght@400;500;600&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#1c1c1e;--sb:#111113;--paper:#f7f3eb;--ink:#111;
  --acc:#4a90d9;--bdr:#2a2a2c;
  --ce:#a02020;--cs:#1a5fa0;--ca:#3a7a3a;--cd:#5a4aaa;
  --fs:'Courier Prime',monospace;--fz:13px;
}
body{font-family:'IBM Plex Sans KR',sans-serif;background:var(--bg);color:#ccc;height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* TOPBAR */
.topbar{height:44px;background:var(--sb);border-bottom:1px solid var(--bdr);display:flex;align-items:center;padding:0 16px;gap:10px;flex-shrink:0;z-index:100}
.logo{font-family:'Courier Prime',monospace;font-weight:700;font-size:18px;color:#fff}
.logo em{color:var(--acc);font-style:normal}
.tdiv{width:1px;height:20px;background:var(--bdr);flex-shrink:0}
.tbtn{background:none;border:1px solid transparent;color:#aaa;font-family:'IBM Plex Sans KR',sans-serif;font-size:12px;cursor:pointer;padding:4px 10px;border-radius:5px;transition:all .12s;display:flex;align-items:center;gap:5px}
.tbtn:hover{background:#1e1e20;color:#eee;border-color:var(--bdr)}
.tbtn.pri{background:var(--acc);color:#fff;font-weight:500}
.tbtn.pri:hover{background:#357abd}
.tmid{margin-left:auto;display:flex;gap:8px;align-items:center}
.wc{font-size:11px;color:#555;font-family:'Courier Prime',monospace}

/* LAYOUT */
.main{display:flex;flex:1;overflow:hidden}

/* SIDEBAR */
.sb{width:210px;background:var(--sb);border-right:1px solid var(--bdr);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.sbs{padding:10px 0;border-bottom:1px solid var(--bdr)}
.sbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1.2px;color:#555;padding:0 13px 7px}
.sbi{display:flex;align-items:center;gap:7px;padding:6px 13px;cursor:pointer;font-size:13px;color:#aaa;transition:all .1s;border-left:2px solid transparent}
.sbi:hover{background:#1a1a1c;color:#ddd}
.sbi.on{color:#fff;border-left-color:var(--acc);background:rgba(74,144,217,.07)}
.epdot{width:5px;height:5px;border-radius:50%;background:var(--ce);flex-shrink:0}
.sbadd{display:flex;align-items:center;gap:5px;padding:6px 13px;cursor:pointer;font-size:12px;color:#555;transition:color .1s}
.sbadd:hover{color:var(--acc)}
.fleg{padding:4px 13px 8px}
.fli{display:flex;align-items:center;gap:7px;padding:4px 0;font-size:12px;color:#777}
.fbg{font-size:9px;font-weight:700;padding:2px 5px;border-radius:3px;text-transform:uppercase;letter-spacing:.5px;flex-shrink:0}
.fg-e{background:rgba(160,32,32,.18);color:var(--ce)}
.fg-s{background:rgba(26,95,160,.18);color:var(--cs)}
.fg-a{background:rgba(58,122,58,.18);color:var(--ca)}
.fg-d{background:rgba(90,74,170,.18);color:var(--cd)}
.chips{padding:4px 13px 8px;display:flex;flex-wrap:wrap;gap:4px}
.chip{font-size:11px;padding:3px 8px;border-radius:10px;background:#1e1e20;color:#aaa;border:1px solid #333;cursor:pointer;transition:all .1s;font-family:'Courier Prime',monospace}
.chip:hover{background:var(--acc);color:#fff;border-color:var(--acc)}
.sempty{padding:2px 13px 8px;font-size:12px;color:#444;font-style:italic}

/* EDITOR WRAP */
.edwrap{flex:1;overflow-y:auto;background:#242426;display:flex;flex-direction:column;align-items:center;padding:40px 24px 80px}

/* FORMAT BAR — sits inside paper, pinned to top center */
.fmtbar{
  position: sticky;
  top: 0;
  left: 0;
  transform: none;
  display: flex;
  justify-content: center;
  gap: 4px;
  padding: 5px 8px;
  background: rgba(17,19,21,0.88);
  backdrop-filter: blur(6px);
  border: 1px solid var(--bdr);
  border-radius: 8px;
  box-shadow: 0 4px 20px rgba(0,0,0,.55);
  z-index: 150;
  flex-shrink: 0;
  white-space: nowrap;
  margin-bottom: 20px;
}
.fmtb{font-size:9px;font-weight:700;padding:4px 10px;border-radius:5px;text-transform:uppercase;letter-spacing:.5px;cursor:pointer;border:1px solid transparent;font-family:'IBM Plex Sans KR',sans-serif;transition:all .12s;background:transparent;display:flex;align-items:center;gap:5px;color:#fff}
.fmtb .kh{font-size:8px;opacity:.6;font-weight:400}
.fmtb:hover{background:rgba(255,255,255,.05)}
.fmtb.on{border-color:rgba(255,255,255,.5);background:rgba(255,255,255,.05)}

/* PAPER */
.page{width:660px;background:var(--paper);box-shadow:0 4px 40px rgba(0,0,0,.5);padding:56px 80px 80px;border-radius:2px;position:relative;padding-top:72px}
.ptitle{font-family:var(--fs);font-size:12px;color:#333;text-align:center;margin-bottom:28px;text-transform:uppercase;letter-spacing:3px;background:transparent;border:none;outline:none;width:100%}
.ptitle::placeholder{color:#888}

/* EDITOR — single contenteditable, full cross-block text selection */
#editor{font-family:var(--fs);font-size:var(--fz);line-height:1.8;color:var(--ink);outline:none;width:100%;position:relative}
#editor p{margin:0;padding:0;min-height:1.8em;position:relative;word-break:break-word;outline:none}
#editor p[data-ph]:empty::before{content:attr(data-ph);color:#bbb;font-style:italic;pointer-events:none;position:absolute}

/* EPISODE */
#editor p.t-episode{font-weight:700;font-size:13px;color:var(--ce);padding-top:22px;padding-bottom:3px}
/* SCENE */
#editor p.t-scene{font-weight:400;text-transform:uppercase;color:var(--cs);padding-top:18px;padding-bottom:1px}
/* ACTION — hanging indent so wrapped lines align after ▲ */
#editor p.t-action{color:#1a1a1a;padding-left:1.5ch;text-indent:-1.5ch}
/* DIALOGUE */
#editor p.t-dialogue{color:#111;padding-top:1px}

/* Drag indicator */
#editor p.drag-over-top{border-top:2px solid var(--acc)}
#editor p.drag-over-bot{border-bottom:2px solid var(--acc)}
#editor p.dragging{opacity:.3}

/* DROPDOWN */
.ddmenu{position:fixed;background:#111113;border:1px solid #333;border-radius:7px;box-shadow:0 8px 24px rgba(0,0,0,.8);z-index:1000;min-width:190px;overflow:hidden;display:none}
.ddmenu.show{display:block}
.ddsec{padding:6px 12px 3px;font-size:9px;text-transform:uppercase;letter-spacing:1px;color:#666;border-top:1px solid #222;font-family:'IBM Plex Sans KR',sans-serif}
.ddsec:first-child{border-top:none}
.dditem{padding:8px 12px;cursor:pointer;font-size:13px;color:#ccc;font-family:'Courier Prime',monospace;transition:background .07s}
.dditem:hover,.dditem.sel{background:var(--acc);color:#fff}

.vermenu{position:fixed;z-index:1001;min-width:220px;background:#111113;border:1px solid #333;border-radius:8px;box-shadow:0 10px 26px rgba(0,0,0,.8);overflow:hidden;display:none}
.vermenu.show{display:block}
.veritem{padding:10px 14px;font-size:12px;color:#ddd;cursor:pointer;transition:background .12s;border-bottom:1px solid rgba(255,255,255,.04);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.veritem:hover{background:rgba(255,255,255,.06)}
.veritem.empty{color:#777;cursor:default}

/* SETTINGS */
.sov{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:500;display:none;align-items:center;justify-content:center}
.sov.show{display:flex}
.spanel{background:#18181a;border:1px solid var(--bdr);border-radius:12px;padding:24px;width:350px}
.sptitle{font-size:15px;font-weight:600;color:#eee;margin-bottom:18px}
.spsec{margin-bottom:18px}
.splbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:#555;margin-bottom:8px}
.sprow{display:flex;gap:7px;flex-wrap:wrap}
.spopt{padding:6px 12px;border-radius:6px;border:1px solid #333;background:#111;color:#999;cursor:pointer;font-size:12px;font-family:'IBM Plex Sans KR',sans-serif;transition:all .12s}
.spopt:hover{border-color:#555;color:#eee}
.spopt.on{border-color:var(--acc);color:var(--acc);background:rgba(74,144,217,.1)}
.spopt.pw{flex-direction:column;display:flex;align-items:center;gap:4px;padding:7px 10px;font-size:11px}
.pswatch{width:38px;height:24px;border-radius:3px;border:1px solid rgba(0,0,0,.15)}
.slrow{display:flex;align-items:center;gap:10px}
.slrow input[type=range]{flex:1;accent-color:var(--acc)}
.slval{font-size:12px;color:#777;min-width:30px;text-align:right;font-family:'Courier Prime',monospace}
.spclose{width:100%;margin-top:6px;padding:8px;border-radius:6px;border:none;background:#222;color:#aaa;cursor:pointer;font-size:13px;font-family:'IBM Plex Sans KR',sans-serif}
.spclose:hover{background:#2a2a2c;color:#eee}

/* Drag handle overlay */
#dragHandle{position:fixed;opacity:0;z-index:200;cursor:grab;color:#ccc;font-size:14px;user-select:none;padding:6px 4px;transition:opacity .1s;pointer-events:auto;background:rgba(30,30,32,0.7);border-radius:4px;line-height:1}
#dragHandle::before{content:'⋮'}
#dragHandle:active{cursor:grabbing}

::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#2a2a2c;border-radius:3px}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">Script<em>ly</em></div>
  <div class="tdiv"></div>
  <button class="tbtn" onclick="importFile()">↑ Import</button>
  <button class="tbtn" onclick="doExport()">↓ Export</button>
  <button class="tbtn" onclick="openSettings()">⚙ Settings</button>
  <div class="tmid">
    <span class="wc" id="wc">0 words</span>
    <span class="wc" id="saveStatus">Ready</span>
    <button id="versionsBtn" class="tbtn" onclick="showVersions(event)">Versions</button>
    <button class="tbtn pri" onclick="saveVersion()">Save</button>
  </div>
</div>
<div class="vermenu" id="verMenu"></div>

<div class="main">
  <div class="sb">
    <div class="sbs">
      <div class="sbl">Episodes</div>
      <div id="epList"></div>
      <div class="sbadd" onclick="addEpisode()">＋ Add Episode</div>
    </div>
    <div class="sbs">
      <div class="sbl">Formats</div>
      <div class="fleg">
        <div class="fli"><span class="fbg fg-e">Episode</span>Episode N:</div>
        <div class="fli"><span class="fbg fg-s">Scene</span>INT./EXT./I/E.</div>
        <div class="fli"><span class="fbg fg-a">Action</span>▲ direction</div>
        <div class="fli"><span class="fbg fg-d">Dialogue</span>NAME: line</div>
      </div>
    </div>
    <div class="sbs">
      <div class="sbl">Characters</div>
      <div class="chips" id="charList"></div>
    </div>
    <div class="sbs">
      <div class="sbl">Locations</div>
      <div class="chips" id="locList"></div>
    </div>
  </div>

  <div class="edwrap">

    <div class="fmtbar">
      <button class="fmtb fb-e" id="ftb-episode"  onclick="setType('episode')"><span class="fbg fg-e">Episode</span><span class="kh">⌘1</span></button>
      <button class="fmtb fb-s" id="ftb-scene"    onclick="setType('scene')"><span class="fbg fg-s">Scene</span><span class="kh">⌘2</span></button>
      <button class="fmtb fb-a" id="ftb-action"   onclick="setType('action')"><span class="fbg fg-a">Action</span><span class="kh">⌘3</span></button>
      <button class="fmtb fb-d" id="ftb-dialogue" onclick="setType('dialogue')"><span class="fbg fg-d">Dialogue</span><span class="kh">⌘4</span></button>
    </div>
    <div class="page" id="page">
      <input class="ptitle" id="ptitle" placeholder="UNTITLED SCRIPT" spellcheck="false">
      <div id="editor" contenteditable="true" spellcheck="true"></div>
    </div>
  </div>

<!-- SETTINGS OVERLAY -->
<div class="sov" id="sov" onclick="if(event.target===this)closeSettings()">
  <div class="spanel">
    <div class="sptitle">⚙ Settings</div>
    <div class="spsec">
      <div class="splbl">Script Font</div>
      <div class="sprow" id="fontOpts">
        <button class="spopt on" data-font="'Courier Prime',monospace" onclick="setFont(this)">Courier Prime</button>
        <button class="spopt" data-font="'Courier New',monospace" onclick="setFont(this)">Courier New</button>
        <button class="spopt" data-font="'IBM Plex Mono',monospace" onclick="setFont(this)">IBM Plex Mono</button>
        <button class="spopt" data-font="Georgia,serif" onclick="setFont(this)">Georgia</button>
      </div>
    </div>
    <div class="spsec">
      <div class="splbl">Font Size</div>
      <div class="slrow">
        <input type="range" min="11" max="18" value="13" id="fsSlider" oninput="setFontSize(this.value)">
        <span class="slval" id="fsVal">13px</span>
      </div>
    </div>
    <div class="spsec">
      <div class="splbl">Paper Color</div>
      <div class="sprow" id="paperOpts">
        <button class="spopt pw on" data-color="#f7f3eb" onclick="setPaper(this)"><span class="pswatch" style="background:#f7f3eb"></span>Warm</button>
        <button class="spopt pw" data-color="#ffffff" onclick="setPaper(this)"><span class="pswatch" style="background:#fff"></span>White</button>
        <button class="spopt pw" data-color="#f0ede4" onclick="setPaper(this)"><span class="pswatch" style="background:#f0ede4"></span>Ivory</button>
        <button class="spopt pw" data-color="#e8f0e8" onclick="setPaper(this)"><span class="pswatch" style="background:#e8f0e8"></span>Mint</button>
        <button class="spopt pw" data-color="#1a1a1a" onclick="setPaper(this)"><span class="pswatch" style="background:#1a1a1a;border-color:#444"></span>Dark</button>
      </div>
    </div>
    <button class="spclose" onclick="closeSettings()">Close</button>
  </div>
</div>

<div class="ddmenu" id="ddMenu"></div>
<div id="dragHandle"></div>
<input type="file" id="fileInput" accept=".rtf,.txt" style="display:none" onchange="handleImport(event)">

<script>
'use strict';
// ── CONSTANTS ─────────────────────────────────────────────
const PREFIXES   = ['INT.','EXT.','I/E.'];
const TIMES      = ['DAY','NIGHT','DAWN','MORNING','AFTERNOON','EVENING','DUSK','CONTINUOUS','LATER','EARLIER'];
const TYPE_ORDER = ['episode','scene','action','dialogue'];
const PH = {episode:'Episode 1:',scene:'INT. LOCATION - TIME OF DAY',action:'Stage direction',dialogue:'ROSIE: Dialogue text'};

// ── STATE ─────────────────────────────────────────────────
let characters = new Set();
let locations  = new Set();
let dd = {show:false,type:null,items:[],sel:0,targetP:null};
let dragSrcP   = null;
let hoveredP   = null;
let _lock      = false;

// ── HELPERS ───────────────────────────────────────────────
const ED    = ()=>document.getElementById('editor');
const allPs = ()=>[...ED().querySelectorAll('p')];
const gType = p=>p.dataset.t||'action';

function curP(){
  const s=window.getSelection();
  if(!s.rangeCount)return null;
  let n=s.getRangeAt(0).startContainer;
  while(n&&n.nodeName!=='P')n=n.parentNode;
  return(n&&n.parentNode===ED())?n:null;
}

function setTypeOnP(p,type,keepText=true){
  const prev=p.dataset.t;
  const txt=p.textContent;
  p.dataset.t=type;
  p.className='t-'+type;
  p.setAttribute('data-ph',PH[type]);
  if(!keepText)return;
  // Manage ▲ prefix for action type
  if(type==='action'&&prev!=='action'){
    if(txt&&!txt.startsWith('▲ '))p.textContent='▲ '+txt;
  }else if(type!=='action'&&prev==='action'){
    if(txt.startsWith('▲ '))p.textContent=txt.slice(2);
    else if(txt==='▲')p.textContent='';
  }
}

function mkP(type,text){
  const p=document.createElement('p');
  p.dataset.t=type;
  p.className='t-'+type;
  p.setAttribute('data-ph',PH[type]);
  // Action: prepend ▲ if not already there
  if(type==='action'&&text&&!text.startsWith('▲ '))p.textContent='▲ '+text;
  else p.textContent=text||'';
  return p;
}

// ── CONT'D LOGIC ──────────────────────────────────────────
// Extract base character name from dialogue line (strips CONT'D, notes)
function getCharName(text){
  // Find first : not inside parentheses
  let depth=0;
  for(let i=0;i<text.length;i++){
    if(text[i]==='(')depth++;
    else if(text[i]===')')depth--;
    else if(text[i]===':'&&depth===0){
      const raw=text.slice(0,i).trim().toUpperCase();
      // Strip ALL parentheticals (notes, CONT'D, etc.) to get base name
      const clean=raw.replace(/\([^)]*\)/g,'').trim();
      if(/^[A-Z][A-Z\s]*$/.test(clean)&&clean.length>0)return clean;
      return null;
    }
  }
  return null;
}

// CONT'D auto-add removed.

// ── LOAD BLOCKS ──────────────────────────────────────────────
function loadBlocks(arr){
  const ed=ED();
  ed.innerHTML='';
  arr.forEach(({type,text})=>{
    // Strip leading ▲ from imported action — mkP re-adds it
    const t=(type==='action'&&text.startsWith('▲ '))?text.slice(2):text;
    ed.appendChild(mkP(type,t||''));
  });
  syncAll();
  // Focus first p
  const first=ED().querySelector('p');
  if(first){const r=document.createRange();r.setStart(first,0);r.collapse(true);const s=window.getSelection();s.removeAllRanges();s.addRange(r);}
}

// ── KEYDOWN ────────────────────────────────────────────────
ED().addEventListener('keydown',e=>{
  const p=curP();

  // Dropdown keys
  if(dd.show){
    if(e.key==='ArrowDown'){e.preventDefault();moveDd(1);return;}
    if(e.key==='ArrowUp'){e.preventDefault();moveDd(-1);return;}
    if(e.key==='Enter'||e.key==='Tab'){e.preventDefault();pickDd();return;}
    if(e.key==='Escape'){hideDd();return;}
  }

  // Enter → new paragraph
  if(e.key==='Enter'&&!e.shiftKey){
    e.preventDefault();
    if(!p)return;
    const fullText=p.textContent;
    // Caret offset in plain text
    const s=window.getSelection();
    const r=s.getRangeAt(0).cloneRange();
    r.selectNodeContents(p);r.setEnd(s.getRangeAt(0).startContainer,s.getRangeAt(0).startOffset);
    const offset=r.toString().length;
    let before=fullText.slice(0,offset);
    let after=fullText.slice(offset);
    // If action, strip ▲ from "after" portion that will go to new p
    if(gType(p)==='action'&&after.startsWith('▲ '))after=after.slice(2);
    p.textContent=before||'';
    // Determine new type from flow
    const flowMap={episode:'scene',scene:'action',action:'dialogue',dialogue:'dialogue'};
    const newType=flowMap[gType(p)]||'action';
    const newP=mkP(newType,after);
    p.after(newP);
    // Move caret to start of newP
    const nr=document.createRange();
    nr.setStart(newP,0);nr.collapse(true);
    const ns=window.getSelection();ns.removeAllRanges();ns.addRange(nr);
    syncAll();
    triggerDD(newP);
    return;
  }

  // Backspace on empty → delete block
  if(e.key==='Backspace'&&p){
    hideDd();
    const t=p.textContent;
    const isEmpty=(t==='')||(gType(p)==='action'&&(t==='▲ '||t==='▲'));
    if(isEmpty&&allPs().length>1){
      e.preventDefault();
      const ps=allPs();const idx=ps.indexOf(p);
      const prev=ps[idx-1]||ps[idx+1];
      p.remove();
      if(prev)caretEnd(prev);
      syncAll();
    }
    return;
  }

  // Tab / Shift+Tab → cycle type
  if(e.key==='Tab'&&!dd.show){
    e.preventDefault();
    if(!p)return;
    const cur=TYPE_ORDER.indexOf(gType(p));
    const next=((cur+(e.shiftKey?-1:1))+TYPE_ORDER.length)%TYPE_ORDER.length;
    setTypeOnP(p,TYPE_ORDER[next]);
    syncAll();syncTB();
    return;
  }

  // ⌘1-4
  if((e.metaKey||e.ctrlKey)&&!e.shiftKey){
    const map={'1':'episode','2':'scene','3':'action','4':'dialogue'};
    if(map[e.key]){e.preventDefault();setType(map[e.key]);return;}
    if(e.key==='s'){e.preventDefault();saveVersion();return;}
  }
});

// ── INPUT ──────────────────────────────────────────────────
ED().addEventListener('input',()=>{
  const p=curP();if(!p)return;
  // Keep ▲ on action blocks
  if(gType(p)==='action'){
    const t=p.textContent;
    if(t!==''&&!t.startsWith('▲')){
      const s=window.getSelection();
      let off=0;
      if(s.rangeCount){const r=s.getRangeAt(0).cloneRange();r.selectNodeContents(p);r.setEnd(s.getRangeAt(0).startContainer,s.getRangeAt(0).startOffset);off=r.toString().length;}
      p.textContent='▲ '+t;
      // restore caret
      try{const r=document.createRange();const nd=p.firstChild||p;const o=Math.min(off+2,nd.length||0);r.setStart(nd,o);r.collapse(true);const sv=window.getSelection();sv.removeAllRanges();sv.addRange(r);}catch(err){}
    }
  }
  syncAll();
  handleDD(p);
});

ED().addEventListener('click',()=>{syncTB();hideDd();});
ED().addEventListener('focus',()=>setTimeout(()=>{syncTB();},0),true);

// ── SYNC ───────────────────────────────────────────────────
function syncAll(){
  rebuildEntities();
  syncSidebar();
  syncWC();
  syncTB();
}

function syncTB(){
  const p=curP(),t=p?gType(p):null;
  TYPE_ORDER.forEach(type=>document.getElementById('ftb-'+type)?.classList.toggle('on',type===t));
}

function syncWC(){
  const w=allPs().map(p=>p.textContent).join(' ').trim().split(/\s+/).filter(Boolean).length;
  document.getElementById('wc').textContent=w+' words';
}

const AUTOSAVE_KEY = 'scriptly-autosave';
const AUTOSAVE_VERSIONS_KEY = 'scriptly-autosave-versions';
const AUTOSAVE_MAX_VERSIONS = 5;
let autosaveDirty = false;
let lastSavedHash = '';

function getDraftData(){
  return {
    title:document.getElementById('ptitle').value,
    blocks:allPs().map(p=>({type:gType(p),text:p.textContent})),
    savedAt:Date.now()
  };
}

function getDraftHash(draft){
  return JSON.stringify([draft.title,draft.blocks.map(b=>[b.type,b.text])]);
}

function showSaveStatus(text){
  const el=document.getElementById('saveStatus');
  if(el)el.textContent=text;
}

function addVersion(draft){
  let list=[];
  try{list=JSON.parse(localStorage.getItem(AUTOSAVE_VERSIONS_KEY)||'[]');}catch(e){list=[];}
  const entry={title:draft.title,blocks:draft.blocks,savedAt:draft.savedAt};
  if(list.length&&getDraftHash(list[0])===getDraftHash(entry))return;
  list.unshift(entry);
  if(list.length>AUTOSAVE_MAX_VERSIONS)list=list.slice(0,AUTOSAVE_MAX_VERSIONS);
  localStorage.setItem(AUTOSAVE_VERSIONS_KEY,JSON.stringify(list));
}

function saveDraft(force=false){
  const draft=getDraftData();
  const hash=getDraftHash(draft);
  if(!force && !autosaveDirty && hash===lastSavedHash) return;
  try{
    localStorage.setItem(AUTOSAVE_KEY,JSON.stringify(draft));
    addVersion(draft);
    lastSavedHash=hash;
    autosaveDirty=false;
    showSaveStatus('Autosaved');
  }catch(e){console.warn('Autosave failed',e);}
}

function saveVersion(){
  saveDraft(true);
  showSaveStatus('Saved version');
}

function getSavedVersions(){
  try{return JSON.parse(localStorage.getItem(AUTOSAVE_VERSIONS_KEY)||'[]');}catch(e){return [];}
}

function formatTime(ts){
  const d=new Date(ts);
  return d.toLocaleString([], {month:'short',day:'numeric',hour:'2-digit',minute:'2-digit',second:'2-digit'});
}

function showVersions(event){
  event.stopPropagation();
  const menu=document.getElementById('verMenu');
  const versions=getSavedVersions();
  menu.innerHTML='';
  if(!versions.length){
    menu.innerHTML='<div class="veritem empty">No saved versions</div>';
  } else {
    versions.forEach((item,i)=>{
      const el=document.createElement('div');
      el.className='veritem';
      el.textContent=(item.title||'Untitled')+' — '+formatTime(item.savedAt);
      el.onclick=()=>restoreVersion(i);
      menu.appendChild(el);
    });
  }
  const rect=event.currentTarget.getBoundingClientRect();
  menu.style.left=rect.right-220+'px';
  menu.style.top=rect.bottom+8+'px';
  menu.classList.add('show');
}

function hideVersionMenu(){
  document.getElementById('verMenu').classList.remove('show');
}

function restoreVersion(index){
  const versions=getSavedVersions();
  const item=versions[index];
  if(!item) return;
  document.getElementById('ptitle').value=item.title||'';
  loadBlocks(item.blocks);
  lastSavedHash=getDraftHash(item);
  autosaveDirty=true;
  showSaveStatus('Restored version');
  hideVersionMenu();
}

function loadDraft(){
  const raw=localStorage.getItem(AUTOSAVE_KEY);
  if(!raw) return false;
  try{
    const data=JSON.parse(raw);
    if(data && Array.isArray(data.blocks)){
      document.getElementById('ptitle').value=data.title||'';
      loadBlocks(data.blocks);
      lastSavedHash=getDraftHash(data);
      showSaveStatus('Restored draft');
      return true;
    }
  }catch(e){console.warn('loadDraft failed',e);}
  return false;
}

function markDirty(){
  autosaveDirty=true;
  showSaveStatus('Unsaved changes');
}

function setupAutoSave(){
  document.getElementById('ptitle').addEventListener('input',markDirty);
  ED().addEventListener('input',markDirty);
  window.addEventListener('beforeunload',()=>saveDraft(true));
  setInterval(()=>saveDraft(),5000);
}

function setType(type){
  const p=curP();if(!p)return;
  setTypeOnP(p,type);
  syncAll();syncTB();caretEnd(p);
}

function rebuildEntities(){
  characters.clear();locations.clear();
  allPs().forEach(p=>{
    const type=gType(p),text=p.textContent;
    if(type==='scene'){
      const pfx=PREFIXES.find(x=>text.toUpperCase().startsWith(x));
      if(pfx){let r=text.slice(pfx.length).trim();if(r.includes(' - ')){const parts=r.split(' - ');if(parts[1].trim())locations.add(parts[0].trim().toUpperCase());}}
    }
    if(type==='dialogue'){
      const base=getCharName(text);
      if(base)characters.add(base);
    }
  });
}

// ── SIDEBAR ────────────────────────────────────────────────
function syncSidebar(){
  const cl=document.getElementById('charList');
  cl.innerHTML='';
  if(!characters.size)cl.innerHTML='<span class="sempty">None yet</span>';
  else[...characters].sort().forEach(n=>cl.appendChild(mkChip(n,()=>insertChar(n))));

  const ll=document.getElementById('locList');
  ll.innerHTML='';
  if(!locations.size)ll.innerHTML='<span class="sempty">None yet</span>';
  else[...locations].sort().forEach(l=>ll.appendChild(mkChip(l,()=>insertLoc(l))));

  const el=document.getElementById('epList');
  el.innerHTML='';
  const eps=allPs().filter(p=>gType(p)==='episode');
  if(!eps.length)el.innerHTML='<div class="sempty" style="padding:3px 13px 6px">None yet</div>';
  else eps.forEach(p=>{
    const d=document.createElement('div');
    d.className='sbi';
    d.innerHTML=`<span class="epdot"></span>${p.textContent||'Episode'}`;
    d.onclick=()=>{p.scrollIntoView({behavior:'smooth',block:'center'});caretEnd(p);};
    el.appendChild(d);
  });
}

function mkChip(text,cb){const c=document.createElement('span');c.className='chip';c.textContent=text;c.onclick=cb;return c;}

function insertChar(name){
  const p=curP();if(!p)return;
  setTypeOnP(p,'dialogue');
  p.textContent=name+': ';
  caretEnd(p);ED().focus();syncAll();
}

function insertLoc(loc){
  const p=curP();if(!p)return;
  setTypeOnP(p,'scene');
  p.textContent='INT. '+loc+' - ';
  caretEnd(p);ED().focus();syncAll();
}

function addEpisode(){
  const n=allPs().filter(p=>gType(p)==='episode').length+1;
  const p=mkP('episode','Episode '+n+':');
  ED().appendChild(p);
  caretEnd(p);p.scrollIntoView({behavior:'smooth',block:'center'});
  syncAll();
}

// ── AUTOCOMPLETE ────────────────────────────────────────────
function triggerDD(p){
  if(!p||p.textContent.length>0){if(p)handleDD(p);return;}
  const t=gType(p);
  if(t==='scene')showDd('prefix',PREFIXES,p);
  else if(t==='dialogue'&&characters.size)showDd('character',[...characters].sort(),p);
  else hideDd();
}

function handleDD(p){
  const text=p.textContent,up=text.toUpperCase(),t=gType(p);
  if(t==='scene'){
    if(!text){showDd('prefix',PREFIXES,p);return;}
    const pfx=PREFIXES.find(x=>up.startsWith(x));
    if(pfx){
      const after=text.slice(pfx.length).trim();
      const dashIdx=after.indexOf('-');
      if(dashIdx>=0){
        const tq=after.slice(dashIdx+1).trim().toUpperCase();
        console.log('time query:', tq, 'TIMES:', TIMES);
        const f=tq?TIMES.filter(x=>x.startsWith(tq)):TIMES;
        console.log('filtered times:', f);
        if(f.length){showDd('time',f,p);return;}
        hideDd();return;
      }
      const locQ=after;
      if(locQ.length>=1){const f=[...locations].filter(l=>l.startsWith(locQ.toUpperCase()));if(f.length){showDd('location',f,p);return;}}
      hideDd();return;
    }
    if(text.length>=1&&text.length<=5){const f=PREFIXES.filter(x=>x.startsWith(up));if(f.length){showDd('prefix',f,p);return;}}
    hideDd();return;
  }
  if(t==='dialogue'){
    // Only suggest before first ( or :
    let depth=0,stop=text.length;
    for(let i=0;i<text.length;i++){if(text[i]==='(')depth++;else if(text[i]===')')depth--;else if(text[i]===':'&&depth===0){stop=i;break;}}
    if(stop===text.length){
      const q=up.replace(/\s*\(CONT'D\)\s*/gi,'').trim();
      const f=!q?[...characters].sort():[...characters].filter(c=>c.startsWith(q));
      if(f.length){showDd('character',f,p);return;}
    }
    hideDd();return;
  }
  hideDd();
}

const DD_LABELS={prefix:'Scene Type',location:'Locations',time:'Time of Day',character:'Characters'};
function showDd(type,items,p){
  dd={show:true,type,items,sel:0,targetP:p};
  const menu=document.getElementById('ddMenu');
  const sel=window.getSelection();
  let rect;
  if(sel.rangeCount){
    const range=sel.getRangeAt(0);
    rect=range.getBoundingClientRect();
  }else{
    rect=p.getBoundingClientRect();
  }
  menu.innerHTML=`<div class="ddsec">${DD_LABELS[type]||type}</div>`;
  items.forEach((item,i)=>{
    const d=document.createElement('div');
    d.className='dditem'+(i===0?' sel':'');
    d.textContent=item;
    d.onmousedown=e=>{e.preventDefault();dd.sel=i;pickDd();};
    menu.appendChild(d);
  });
  const mh=Math.min(items.length*34+30,320);
  const below=window.innerHeight-(rect.bottom+6);
  menu.style.left=rect.left+'px';
  menu.style.top=(below>mh?rect.bottom+6:rect.top-mh-4)+'px';
  menu.classList.add('show');
}
function hideDd(){dd.show=false;document.getElementById('ddMenu').classList.remove('show');}
function moveDd(dir){
  dd.sel=((dd.sel+dir)+dd.items.length)%dd.items.length;
  document.querySelectorAll('#ddMenu .dditem').forEach((el,i)=>el.classList.toggle('sel',i===dd.sel));
}
function pickDd(){
  if(!dd.show||!dd.targetP)return;
  const val=dd.items[dd.sel],p=dd.targetP,t=gType(p);
  if(t==='scene'){
    if(dd.type==='prefix')p.textContent=val+' ';
    else if(dd.type==='location'){const pfx=PREFIXES.find(x=>p.textContent.toUpperCase().startsWith(x))||'INT.';p.textContent=pfx+' '+val+' - ';}
    else if(dd.type==='time'){const di=p.textContent.lastIndexOf(' - ');p.textContent=p.textContent.slice(0,di+3)+val;}
  }else if(t==='dialogue'){p.textContent=val+': ';}
  hideDd();caretEnd(p);syncAll();
}

document.addEventListener('mousedown',e=>{
  if(!document.getElementById('ddMenu').contains(e.target))hideDd();
  if(!document.getElementById('verMenu').contains(e.target) && !e.target.closest('#versionsBtn')) hideVersionMenu();
});

// ── DRAG & DROP (block reorder) ──────────────────────────────
// Strategy: single floating handle element triggers drag.
// editorEl captures dragover/drop only when dragSrcP is set.
// When dragSrcP is null, browser handles text selection drag normally.

const handleEl=document.getElementById('dragHandle');

// Show handle on mousemove over editor
ED().addEventListener('mousemove',e=>{
  if(dragSrcP)return;
  const p=e.target.closest&&e.target.closest('#editor > p');
  if(p){
    hoveredP=p;
    const r=p.getBoundingClientRect();
    handleEl.style.left=(r.left-36)+'px';
    handleEl.style.top=(r.top+2)+'px';
    handleEl.style.opacity='1';
  }
});
ED().addEventListener('mouseleave',()=>{
  if(!handleEl.matches(':hover')){handleEl.style.opacity='0';hoveredP=null;}
});
handleEl.addEventListener('mouseenter',()=>{handleEl.style.opacity='1';});
handleEl.addEventListener('mouseleave',()=>{if(!ED().matches(':hover')){handleEl.style.opacity='0';hoveredP=null;}});

// Drag from handle
handleEl.draggable = false;
handleEl.addEventListener('mousedown', e => {
  console.log('Handle mousedown');
  e.preventDefault();
  // Ensure hoveredP is set
  if(!hoveredP) {
    const el = document.elementFromPoint(e.clientX, e.clientY);
    let targetP = el.closest('#editor > p');
    if(!targetP) {
      // Try slightly to the right (where the paragraph should be)
      targetP = document.elementFromPoint(e.clientX + 40, e.clientY).closest('#editor > p');
    }
    if(targetP) hoveredP = targetP;
  }
  console.log('hoveredP after check:', hoveredP);
  if(!hoveredP) {
    console.log('Still no hoveredP, aborting');
    return;
  }
  console.log('Starting drag for:', hoveredP.textContent.slice(0,20));
  dragSrcP = hoveredP;
  // Create a clone that follows the mouse
  const rect = dragSrcP.getBoundingClientRect();
  const offsetX = e.clientX - rect.left;
  const offsetY = e.clientY - rect.top;
  const clone = dragSrcP.cloneNode(true);
  clone.style.position = 'fixed';
  clone.style.left = rect.left + 'px';
  clone.style.top = rect.top + 'px';
  clone.style.width = rect.width + 'px';
  clone.style.zIndex = '1000';
  clone.style.opacity = '0.8';
  clone.style.pointerEvents = 'none';
  document.body.appendChild(clone);
  dragSrcP.style.opacity = '0'; // Hide original
  handleEl.style.opacity = '0';
  let dropTarget = null;
  let isTop = false;
  const moveHandler = e => {
    clone.style.left = (e.clientX - offsetX) + 'px';
    clone.style.top = (e.clientY - offsetY) + 'px';
    const el = document.elementFromPoint(e.clientX, e.clientY);
    const p = el ? el.closest('#editor > p') : null;
    if(p && p !== dragSrcP){
      allPs().forEach(x => x.classList.remove('drag-over-top','drag-over-bot'));
      const r = p.getBoundingClientRect();
      isTop = e.clientY < r.top + r.height / 2;
      p.classList.add(isTop ? 'drag-over-top' : 'drag-over-bot');
      dropTarget = p;
    } else {
      allPs().forEach(x => x.classList.remove('drag-over-top','drag-over-bot'));
      dropTarget = null;
    }
  };
  const upHandler = e => {
    console.log('Mouseup, dropTarget:', dropTarget, 'isTop:', isTop);
    clone.remove();
    dragSrcP.style.opacity = '';
    if(dropTarget){
      if(isTop){
        dropTarget.before(dragSrcP);
      } else {
        dropTarget.after(dragSrcP);
      }
      syncAll();
      console.log('Dropped successfully');
    } else {
      console.log('No drop target');
    }
    cleanDrag();
    document.removeEventListener('mousemove', moveHandler);
    document.removeEventListener('mouseup', upHandler);
  };
  document.addEventListener('mousemove', moveHandler);
  document.addEventListener('mouseup', upHandler);
});
handleEl.addEventListener('dragend',()=>cleanDrag());

// Editor receives drag events when dragSrcP is set
const edwrap = document.querySelector('.edwrap');
// Removed drag events, using mouse events instead

function cleanDrag(){
  if(dragSrcP){dragSrcP.classList.remove('dragging');dragSrcP=null;}
  allPs().forEach(p=>p.classList.remove('drag-over-top','drag-over-bot'));
  handleEl.style.opacity='0';hoveredP=null;
}

// ── MUTATION OBSERVER ──────────────────────────────────────
// Keep editor clean — browser may insert divs/brs
const obs=new MutationObserver(()=>{
  if(_lock)return;_lock=true;
  [...ED().childNodes].forEach(n=>{
    if(n.nodeType===3){
      const t=n.textContent;
      if(t.trim()){const p=mkP('action',t);ED().insertBefore(p,n);}
      n.remove();
    }else if(n.tagName==='DIV'||n.tagName==='BR'){
      const p=mkP('action',n.textContent||'');
      ED().insertBefore(p,n);n.remove();
    }
  });
  if(ED().children.length===0)ED().appendChild(mkP('scene',''));
  setTimeout(()=>{_lock=false;},0);
});
obs.observe(ED(),{childList:true,subtree:false});

function isDarkColor(hex){
  // Parse hex and calculate luminance
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return(r*299+g*587+b*114)/1000 < 128;
}
function setPaper(btn){
  document.querySelectorAll('#paperOpts .spopt').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  const c=btn.dataset.color;
  const page=document.getElementById('page');
  page.style.background=c;
  const dark=isDarkColor(c);
  const ink=dark?'#ddd':'#111';
  document.documentElement.style.setProperty('--ink',ink);
  ED().style.color=dark?'#ddd':'';
  document.querySelector('.ptitle').style.color=dark?'#aaa':'#333';
  // Update per-type colors so they stay readable on dark paper
  page.dataset.dark=dark?'1':'';
  // scene / episode / action colors
  const styleId='paper-color-overrides';
  let s=document.getElementById(styleId);
  if(!s){s=document.createElement('style');s.id=styleId;document.head.appendChild(s);}
  if(dark){
    s.textContent=`
      #editor p.t-episode{color:#e07070}
      #editor p.t-scene{color:#6aaddd}
      #editor p.t-action{color:#ccc}
      #editor p.t-dialogue{color:#ddd}
      #editor p[data-ph]:empty::before{color:#666}
      .ptitle::placeholder{color:#555}
    `;
  }else{
    s.textContent=`
      #editor p.t-episode{color:var(--ce)}
      #editor p.t-scene{color:var(--cs)}
      #editor p.t-action{color:#1a1a1a}
      #editor p.t-dialogue{color:#111}
      #editor p[data-ph]:empty::before{color:#bbb}
      .ptitle::placeholder{color:#888}
    `;
  }
}

// ── IMPORT / EXPORT ───────────────────────────────────────
function importFile(){document.getElementById('fileInput').click();}
function handleImport(e){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>parseAndLoad(ev.target.result);
  r.readAsText(f);e.target.value='';
}
function parseAndLoad(raw){
  let text=raw;
  if(raw.trimStart().startsWith('{\\rtf')){
    text=raw.replace(/\{\\rtf[\s\S]*?(?=INT\.|EXT\.|I\/E\.|Episode\s+\d)/,'')
            .replace(/\\[a-z]+\d*\s*/gi,' ').replace(/[{}]/g,'').replace(/\r?\n/g,' ').trim();
  }
  const arr=[];
  raw.split(/(Episode\s+\d+:)/g).forEach(chunk=>{
    chunk=chunk.trim();if(!chunk)return;
    if(/^Episode\s+\d+:$/.test(chunk)){arr.push({type:'episode',text:chunk});return;}
    parseChunk(chunk,arr);
  });
  if(!arr.length)arr.push({type:'scene',text:''});
  loadBlocks(arr);
}
function parseChunk(text,arr){
  text.replace(/▲\s*/g,'\x01').split('\x01').forEach(part=>{
    part=part.trim();if(!part)return;
    if(/^(INT\.|EXT\.|I\/E\.)/i.test(part)){
      const di=part.search(/\s+(?=[A-Z]{2}[A-Z\s]*(?:\([^)]*\))?:)/);
      const heading=di>0?part.slice(0,di).trim():part;
      const rest=di>0?part.slice(di).trim():'';
      arr.push({type:'scene',text:heading});
      if(rest)parseDlg(rest,arr);
      return;
    }
    parseDlg(part,arr);
  });
}
function parseDlg(text,arr){
  const re=/([A-Z][A-Z\s]{0,28}(?:\([^)]*\))?)\s*:/g;
  let last=0,m,segs=[];
  while((m=re.exec(text))!==null){
    const name=m[1].trim();
    if(!/^[A-Z][A-Z\s().,'-]*$/.test(name)||name.length>35)continue;
    if(m.index>last){const pre=text.slice(last,m.index).trim();if(pre)segs.push({type:'action',text:pre});}
    const save=re.lastIndex,nxt=re.exec(text),end=nxt?nxt.index:text.length;
    re.lastIndex=save;
    segs.push({type:'dialogue',text:text.slice(m.index,end).trim()});
    last=end;
  }
  if(last<text.length){const rem=text.slice(last).trim();if(rem)segs.push({type:'action',text:rem});}
  if(!segs.length&&text.trim())segs.push({type:'action',text:text.trim()});
  segs.forEach(s=>arr.push(s));
}
function doExport(){
  let out='';
  allPs().forEach((p,i)=>{
    const t=gType(p),text=p.textContent;
    if(t==='episode')out+=(i?'\n':'')+text+'\n';
    else if(t==='scene')out+=text+'\n';
    else if(t==='action')out+=(text.startsWith('▲ ')?text:'▲ '+text)+'\n';
    else if(t==='dialogue')out+=text+'\n';
  });
  const blob=new Blob([out],{type:'text/plain'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=(document.getElementById('ptitle').value||'script')+'.rtf';
  a.click();URL.revokeObjectURL(url);
}

function caretEnd(el){
  el.focus();
  const r=document.createRange(),s=window.getSelection();
  r.selectNodeContents(el);r.collapse(false);
  s.removeAllRanges();s.addRange(r);
}
